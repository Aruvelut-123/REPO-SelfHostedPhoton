[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "zyxterus"
name = "Self_Hosted_Photon"
description = "Allows you to connect to a self-hosted Photon server via an IP address or a hostname."
websiteUrl = "https://github.com/zyxterus/REPO-SelfHostedPhoton"
containsNsfwContent = false
[package.dependencies]
BepInEx-BepInExPack = "5.4.2304"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/Self_Hosted_Photon/release/Self_Hosted_Photon.dll"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[publish]
communities = ["repo"]
[publish.categories]
repo = ["mods", "serverside", "clientside", "tools"]
